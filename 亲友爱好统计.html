            <div class="time" id="showTime">2024年6月5日 17:00:12</div> 
            <script>
              var t = null;
              t = setTimeout(time, 1000);//開始运行
              function time() {
                clearTimeout(t);//清除定时器
                dt = new Date();
                var y = dt.getFullYear();
                var mt = dt.getMonth()+ 1;
                var day = dt.getDate();
                var h = dt.getHours();//获取时
                var m = dt.getMinutes();//获取分
                var s = dt.getSeconds();//获取秒
                document.querySelector(".time").innerHTML = 
                    y +
                    "年" +
                    mt +
                    "月" +
                    day +
                    "日 " +
                    h +
                    ":" +
                    m +
                    ":" +
                    s +
                    " ";
                   t = setTimeout(time, 1000); //设定定时器，循环运行     
               }
        
            </script>
    </div>
    <div class="tu1" id="tu1"></div>
            <script>
                
        // 基于准备好的dom，初始化echarts实例
        var myChart = echarts.init(document.getElementById("tu1"));
        var option = {
   
   tooltip: {
       trigger: 'axis'
   },
   radar: [{
       indicator: [{
           text: '篮球/喜剧',
           max: 10
       }, {
           text: '跑步/动漫',
           max: 10
       }, {
           text: '有氧操/韩剧',
           max: 10
       }, {
           text: '羽毛球/恐怖',
           max: 10
       }, {
           text: '乒乓球/动作',
           max: 10
       }],
       
       center: ['48%', '60%'],
       radius: '70%',
       startAngle: 90,
       splitNumber: 4,
       shape: 'circle',
   
       name: {
           padding:-5,
           formatter: '{value}',
           textStyle: {
             
               color: 'rgba(255,255,255,.5)'
           }
       },
       splitArea: {
           areaStyle: {
               color: 'rgba(255,255,255,.05)'
           }
       },
       axisLine: {
           lineStyle: {
               color: 'rgba(255,255,255,.05)'
           }
       },
       splitLine: {
           lineStyle: {
               color: 'rgba(255,255,255,.05)'
           }
       }
   }, ],
   series: [{
       name: '雷达图',
       type: 'radar',
       
       tooltip: {
           trigger: 'item'
       },
       data: [{
           name: '运动类型',
           value: [5, 7, 2, 1, 3],
           lineStyle: {
               normal: { 
                   color:'#03b48e',
                   width:2,
               }
           },
           areaStyle: {
               normal: {
                   color: '#03b48e',
                   opacity:.4
               }
           },
           symbolSize: 0,
         
       }, {
           name: '影视类型',
           value: [3, 2, 7, 5, 6],
           symbolSize: 0,
           lineStyle: {
               normal: { 
                   color:'#3893e5',
                   width:2,
               }
           },
                areaStyle: {
               normal: {
                   color: 'rgba(19, 173, 255, 0.5)'
               }
           }
       }]
   }, ]
};
    myChart.setOption(option);
        window.addEventListener("resize",function(){
            myChart.resize();
        });
    
            </script>
