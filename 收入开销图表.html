            <div class="time" id="showTime">2024年6月5日 17:00:12</div> 
            <script>
              var t = null;
              t = setTimeout(time, 1000);//開始运行
              function time() {
                clearTimeout(t);//清除定时器
                dt = new Date();
                var y = dt.getFullYear();
                var mt = dt.getMonth()+ 1;
                var day = dt.getDate();
                var h = dt.getHours();//获取时
                var m = dt.getMinutes();//获取分
                var s = dt.getSeconds();//获取秒
                document.querySelector(".time").innerHTML = 
                    y +
                    "年" +
                    mt +
                    "月" +
                    day +
                    "日 " +
                    h +
                    ":" +
                    m +
                    ":" +
                    s +
                    " ";
                   t = setTimeout(time, 1000); //设定定时器，循环运行     
               }
        
            </script>
    </div>
    <div class="tu1" id="tu1"></div>
            <script>
                
        // 基于准备好的dom，初始化echarts实例
        var myChart = echarts.init(document.getElementById("tu1"));
        var option = {
          grid:{
             top:0,
             left:"center"
          },
        tooltip: {
          trigger: 'item',
          formatter: '{a} <br/>{b} : {c}%'
        },
    color:[ "rgba(152, 198, 25, 1)","rgba(29, 149, 190, 1)","rgba(190, 160, 29, 1)","rgba(208, 218, 61, 0.5)"],
        series: [
          {
            name: '收入',
            type: 'funnel',
            width: '40%',
            height: '45%',
            left: '30%',
            top: "10%",
            colorBy: "data",
            label: {
              position: 'left'
            },
           
            data: [
              { value: 60, name: '寒假兼职' },
              { value: 30, name: '课外兼职' },
              { value: 10, name: '节日红包' },
              { value: 80, name: '暑假兼职' },

            ]
          },
          {
            name: '支出',
            type: 'funnel',
            width: '40%',
            height: '45%',
            left: '30%',
            top: '55%',
            sort: 'ascending',
            label: {
              position: 'right'
            },
            data: [
              { value: 60, name: '吃饭开销' },
              { value: 30, name: '学习开销' },
              { value: 10, name: '护肤品开销' },
              { value: 80, name: '生活用品开销' },
              { value: 100, name: '衣服开销' }
            ]
          }
        ]
      };
    myChart.setOption(option);

            myChart.resize();
        });
    
            </script>
